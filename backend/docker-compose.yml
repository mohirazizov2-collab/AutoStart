version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: avto24-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: avto24
    restart: unless-stopped

  backend:
    build: .
    container_name: avto24-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/avto24
      PORT: 5000
      JWT_SECRET: your_jwt_secret_key_here
      NODE_ENV: production
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  mongodb_data:
